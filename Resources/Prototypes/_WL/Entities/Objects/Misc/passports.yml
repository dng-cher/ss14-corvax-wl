- type: entity
  parent: BaseItem
  id: BasePassport
  name: passport
  description: Papers, please!
  abstract: true
  components:
  - type: Passport
    isClosed: true
  - type: Appearance
  - type: Flammable
    fireSpread: true
    alwaysCombustible: true
    damage:
      types:
        Heat: 1
  - type: FireVisuals
    sprite: Effects/fire.rsi
    normalState: fire
  - type: Damageable
    damageModifierSet: Wood
  - type: Injurable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Ash:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Item
    size: Small
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
    storedRotation: 0
  - type: Sprite
    scale: 0.8, 0.8
    layers:
    - state: icon_closed
  - type: Clothing
    quickEquip: false
    slots:
    - Belt
  - type: Tag
    tags:
    - WhitelistChameleon
    - WhitelistChameleonPassports

- type: entity
  parent: BasePassport
  id: AlliancePassport
  name: alliance passport
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/Passports/alliance.rsi

- type: entity
  parent: BasePassport
  id: EdemPassport
  name: edem passport
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/Passports/edem.rsi

- type: entity
  parent: BasePassport
  id: OrionPassport
  name: orion passport
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/Passports/orion.rsi

- type: entity
  parent: BasePassport
  id: OtherPassport
  name: other passport
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/Passports/other.rsi

- type: entity
  parent: BasePassport
  id: SocconPassport
  name: soccon passport
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/Passports/soccon.rsi

- type: entity
  parent: BasePassport
  id: MetafrontPassport
  name: metafront passport
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/Passports/metafront.rsi

- type: entity
  parent: BasePassport
  id: MetafrontCellPassport
  name: metafront passport
  suffix: Battery
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/Passports/metafront_usb.rsi
    scale: 0.8, 0.8
    layers:
    - state: icon_closed
  - type: PowerCell
  - type: Explosive
    explosionType: Default
    maxIntensity: 200
    intensitySlope: 1.5
  - type: SolutionContainerManager
    solutions:
      battery:
        maxVol: 5
  - type: InjectableSolution
    solution: battery
  - type: DrawableSolution
    solution: battery
  - type: Extractable
    juiceSolution:
      reagents:
        - ReagentId: Zinc
          Quantity: 5
  - type: Riggable
  - type: Appearance
  - type: BatteryVisuals
  - type: Battery
    pricePerJoule: 0.15
    maxCharge: 360
    startingCharge: 360
  - type: Tag
    tags:
    - PowerCellSmall
    - WhitelistChameleon
    - WhitelistChameleonPassports

- type: entity
  parent: BasePassport
  id: SuspicionPassport
  name: suspicion passport
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/Passports/chameleon.rsi

- type: entity
  parent: [SuspicionPassport, BaseChameleon]
  id: ChameleonPassport
  name: suspicion passport
  suffix: Chameleon
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/Passports/chameleon.rsi
  - type: Tag
    tags: [ ]
  - type: ChameleonClothing
    slot: [Belt]
    default: SuspicionPassport
    requireTag: WhitelistChameleonPassports
  - type: ChameleonPassport
  - type: ActivatableUI
    key: enum.ChameleonPassportUiKey.Key
    verbText: agent-id-open-ui-verb
    verbOnly: true
  - type: UIRequiresLock
    userInterfaceKeys:
      - enum.ChameleonUiKey.Key
      - enum.ChameleonPassportUiKey.Key
    accessDeniedSound: null
    popup: null
  - type: UserInterface
    interfaces:
      enum.ChameleonPassportUiKey.Key:
        type: ChameleonPassportBoundUserInterface
      enum.ChameleonUiKey.Key:
        type: ChameleonBoundUserInterface

- type: entity
  parent: BasePassport
